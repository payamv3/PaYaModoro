<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mechanical Time</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #1a1a1a;
            --accent: #8b0000; /* Deep Red for focus */
        }

        body, html {
            height: 100%; margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* The scrolling container */
        #picker {
            height: 300px; width: 200px;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            position: relative;
            z-index: 2;
        }
        #picker::-webkit-scrollbar { display: none; }

        .minute {
            height: 100px;
            display: flex; justify-content: center; align-items: center;
            font-size: 4rem; font-weight: 200;
            scroll-snap-align: center;
            opacity: 0.15;
            transition: opacity 0.3s;
        }
        .minute.active { opacity: 1; }

        /* The indicator frame */
        .frame {
            position: absolute;
            width: 240px; height: 102px;
            border-top: 1px solid var(--text);
            border-bottom: 1px solid var(--text);
            pointer-events: none;
            transition: all 0.5s ease;
        }

        /* Countdown state */
        .running .frame { border-color: var(--accent); width: 280px; }
        .running .minute:not(.active) { visibility: hidden; }
        .running #picker { overflow: hidden; }
        
        .hint {
            position: absolute; bottom: 10%; 
            font-size: 0.7rem; letter-spacing: 2px;
            opacity: 0.4; text-transform: uppercase;
        }
    </style>
</head>
<body onclick="initAudio()">

    <div class="frame"></div>
    <div id="picker"></div>
    <div class="hint" id="status">Scroll to set • Click to start</div>

    <script>
        const picker = document.getElementById('picker');
        const statusHint = document.getElementById('status');
        let audioCtx = null;
        let isRunning = false;
        let timer = null;
        let selectedMins = 25;
        let lastIndex = 25;

        // Create the numbers 0-60
        for (let i = -1; i <= 61; i++) {
            const div = document.createElement('div');
            div.className = 'minute';
            div.innerText = (i >= 0 && i <= 60) ? i.toString().padStart(2, '0') : '';
            picker.appendChild(div);
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playMechanicalTick() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            
            const noise = audioCtx.createBufferSource();
            const bufferSize = audioCtx.sampleRate * 0.01;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = "highpass";
            filter.frequency.value = 5000;

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.01);

            noise.connect(filter).connect(gain).connect(audioCtx.destination);
            noise.start(t);

            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, t);
            osc.frequency.exponentialRampToValueAtTime(40, t + 0.05);
            oscGain.gain.setValueAtTime(0.05, t);
            oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);

            osc.connect(oscGain).connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.05);
        }

        function playLoudChime() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            
            // A rich, harmonic bell sound (Frequencies: 300Hz, 600Hz, 900Hz)
            [300, 600, 900].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                
                gain.gain.setValueAtTime(0.3 / (i + 1), t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 3.0);
                
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(t);
                osc.stop(t + 3.0);
            });
        }

        picker.addEventListener('scroll', () => {
            if (isRunning) return;
            const index = Math.round(picker.scrollTop / 100);
            
            if (index !== lastIndex && index >= 0 && index <= 60) {
                initAudio();
                playMechanicalTick(); // Click sound while scrolling
                lastIndex = index;
            }

            const items = document.querySelectorAll('.minute');
            items.forEach((item, i) => item.classList.toggle('active', i === index + 1));
            selectedMins = index;
        });

        picker.addEventListener('click', () => {
            initAudio();
            if (isRunning) {
                stopTimer();
            } else if (selectedMins > 0) {
                startTimer();
            }
        });

        function startTimer() {
            isRunning = true;
            document.body.classList.add('running');
            statusHint.innerText = "Click to Reset";
            
            let totalSeconds = selectedMins * 60;
            const activeEl = document.querySelector('.minute.active');

            timer = setInterval(() => {
                totalSeconds--;
                playMechanicalTick();

                const m = Math.floor(totalSeconds / 60);
                const s = totalSeconds % 60;
                activeEl.innerText = `${m}:${s.toString().padStart(2, '0')}`;

                if (totalSeconds <= 0) {
                    clearInterval(timer);
                    playLoudChime(); // Play the chime
                    
                    // We use a small timeout so the chime starts BEFORE the alert freezes the browser
                    setTimeout(() => {
                        alert("Time is up.");
                        stopTimer();
                    }, 100);
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
            isRunning = false;
            document.body.classList.remove('running');
            statusHint.innerText = "Scroll to set • Click to start";
            const activeEl = document.querySelector('.minute.active');
            if (activeEl) activeEl.innerText = selectedMins.toString().padStart(2, '0');
        }

        window.onload = () => {
            picker.scrollTop = 2500;
        };
    </script>
</body>
</html>
